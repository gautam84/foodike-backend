openapi: 3.0.3
info:
  title: Foodike Auth API
  version: 0.1.0
  description: |
    Authentication endpoints currently implemented in the Foodike backend.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/health:
    get:
      summary: Auth service health
      operationId: getAuthHealth
      tags: [Auth]
      responses:
        '200':
          description: Auth service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/auth/send-otp:
    post:
      summary: Send OTP to phone
      operationId: sendOtp
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
      responses:
        '200':
          description: OTP accepted for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation error
        '403':
          description: Rate limited or blocked
  /api/v1/auth/verify-otp:
    post:
      summary: Verify OTP and issue tokens
      operationId: verifyOtp
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
        '401':
          description: Invalid or expired OTP
        '403':
          description: Blocked after too many failures
  /api/v1/auth/sso/{provider}:
    post:
      summary: Sign in with an SSO ID token
      description: |
        Generic SSO endpoint. Currently supports `google`. Apple (`apple`) is reserved for future use.
      operationId: ssoAuth
      tags: [Auth]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [google, apple]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoAuthRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Unsupported provider or invalid input
        '401':
          description: Invalid or expired ID token
  /api/v1/auth/google:
    post:
      summary: Sign in with Google ID token (alias for /auth/sso/google)
      operationId: googleAuth
      deprecated: true
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
        '401':
          description: Invalid or expired ID token
  /api/v1/auth/refresh:
    post:
      summary: Rotate refresh token
      operationId: refreshToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          description: Invalid refresh token or replay detected
  /api/v1/auth/logout:
    post:
      summary: Logout current session
      operationId: logout
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Invalid bearer token or refresh token
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      operationId: getMe
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Invalid bearer token
  /api/v1/users/me:
    get:
      summary: Get profile of current user
      operationId: getProfile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          description: Invalid bearer token
    patch:
      summary: Update profile fields (name, email, avatarUrl)
      description: |
        Pass only the fields you want to change. Empty string clears a field; null/omitted leaves it unchanged.
      operationId: updateProfile
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          description: Validation error
        '401':
          description: Invalid bearer token
        '409':
          description: Email already in use
  /api/v1/users/me/addresses:
    get:
      summary: List addresses for current user
      operationId: listAddresses
      tags: [Addresses]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All addresses; default first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressListResponse'
        '401':
          description: Invalid bearer token
    post:
      summary: Create an address
      operationId: createAddress
      tags: [Addresses]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
      responses:
        '201':
          description: Address created. First address auto-marks default.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '400':
          description: Validation error
        '401':
          description: Invalid bearer token
  /api/v1/users/me/addresses/{id}:
    get:
      summary: Fetch a single address
      operationId: getAddress
      tags: [Addresses]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '404':
          description: Address not found or not owned by current user
    patch:
      summary: Update an address
      operationId: updateAddress
      tags: [Addresses]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: Updated address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '400':
          description: Validation error
        '404':
          description: Address not found
    delete:
      summary: Delete an address
      operationId: deleteAddress
      tags: [Addresses]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted. If this was the default, no address remains default.
        '404':
          description: Address not found
  /api/v1/users/me/addresses/{id}/default:
    post:
      summary: Mark an address as the default
      operationId: setDefaultAddress
      tags: [Addresses]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address with isDefault=true; all other addresses for the user unset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '404':
          description: Address not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      properties:
        service:
          type: string
          example: user-service
        status:
          type: string
          example: ready
      required: [service, status]
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP sent
      required: [message]
    SendOtpRequest:
      type: object
      properties:
        phone:
          type: string
          example: "+919999999999"
      required: [phone]
    VerifyOtpRequest:
      type: object
      properties:
        phone:
          type: string
          example: "+919999999999"
        otp:
          type: string
          example: "123456"
      required: [phone, otp]
    GoogleAuthRequest:
      type: object
      properties:
        idToken:
          type: string
      required: [idToken]
    SsoAuthRequest:
      type: object
      properties:
        idToken:
          type: string
      required: [idToken]
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]
    RefreshTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'
        isNewUser:
          type: boolean
      required: [accessToken, refreshToken, user, isNewUser]
    User:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [CUSTOMER, RESTAURANT_OWNER, ADMIN, DELIVERY]
      required: [id, role]
    UserProfileResponse:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [CUSTOMER, RESTAURANT_OWNER, ADMIN, DELIVERY]
        ssoProviders:
          type: array
          items:
            type: string
            enum: [GOOGLE, APPLE]
      required: [id, role, ssoProviders]
    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
    AddressResponse:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 code (e.g., IN, US)
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, label, line1, city, state, postalCode, country, isDefault, createdAt, updatedAt]
    AddressListResponse:
      type: object
      properties:
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/AddressResponse'
      required: [addresses]
    CreateAddressRequest:
      type: object
      properties:
        label:
          type: string
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        isDefault:
          type: boolean
          nullable: true
      required: [label, line1, city, state, postalCode, country]
    UpdateAddressRequest:
      type: object
      properties:
        label:
          type: string
          nullable: true
        line1:
          type: string
          nullable: true
        line2:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
